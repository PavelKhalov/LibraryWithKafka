services:
  kafka-0:
    image: confluentinc/cp-kafka
    hostname: kafka-0
    container_name: kafka-0
    ports:
      - '29092:29092'
    environment:
      CLUSTER_ID: L8jDWMg2QuSdEHerQb6IQw
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  kafka-1:
    image: confluentinc/cp-kafka
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - '29094:29094'
    environment:
      CLUSTER_ID: L8jDWMg2QuSdEHerQb6IQw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29094,CONTROLLER://:9095
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093, 1@kafka-1:9095
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9092,EXTERNAL://localhost:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


  library-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8090:8090
    container_name: library-kafka_ui
    hostname: library-kafka_ui
    depends_on:
      - kafka-0
      - kafka-1
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-0:9091,kafka-1:9091
      DYNAMIC_CONFIG_ENABLED: true

volumes:
  redis_data: